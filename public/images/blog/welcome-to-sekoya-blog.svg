<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 514" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1200" y2="514" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="glow1" x1="300" y1="100" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="514" fill="url(#bg1)"/>
  <rect width="1200" height="514" fill="url(#glow1)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#94A3B8" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="514"/><line x1="60" y1="0" x2="60" y2="514"/>
    <line x1="120" y1="0" x2="120" y2="514"/><line x1="180" y1="0" x2="180" y2="514"/>
    <line x1="240" y1="0" x2="240" y2="514"/><line x1="300" y1="0" x2="300" y2="514"/>
    <line x1="360" y1="0" x2="360" y2="514"/><line x1="420" y1="0" x2="420" y2="514"/>
    <line x1="480" y1="0" x2="480" y2="514"/><line x1="540" y1="0" x2="540" y2="514"/>
    <line x1="600" y1="0" x2="600" y2="514"/><line x1="660" y1="0" x2="660" y2="514"/>
    <line x1="720" y1="0" x2="720" y2="514"/><line x1="780" y1="0" x2="780" y2="514"/>
    <line x1="840" y1="0" x2="840" y2="514"/><line x1="900" y1="0" x2="900" y2="514"/>
    <line x1="960" y1="0" x2="960" y2="514"/><line x1="1020" y1="0" x2="1020" y2="514"/>
    <line x1="1080" y1="0" x2="1080" y2="514"/><line x1="1140" y1="0" x2="1140" y2="514"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="200" cy="120" r="180" fill="#10B981" opacity="0.06"/>
  <circle cx="950" cy="380" r="220" fill="#6366F1" opacity="0.05"/>
  <circle cx="600" cy="257" r="120" fill="#F59E0B" opacity="0.04"/>

  <!-- Blog/writing icon — pen on paper -->
  <g transform="translate(480, 130)">
    <!-- Paper -->
    <rect x="0" y="40" width="160" height="200" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2"/>
    <line x1="30" y1="90" x2="130" y2="90" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="115" x2="130" y2="115" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="140" x2="100" y2="140" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="165" x2="115" y2="165" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="190" x2="80" y2="190" stroke="#334155" stroke-width="2" stroke-linecap="round"/>

    <!-- Pen -->
    <g transform="translate(120, 0) rotate(25, 60, 30)">
      <rect x="50" y="0" width="16" height="80" rx="3" fill="url(#accent1)"/>
      <polygon points="50,80 66,80 58,100" fill="#10B981"/>
      <rect x="50" y="0" width="16" height="12" rx="3" fill="#059669"/>
    </g>

    <!-- Sparkle -->
    <g transform="translate(190, 20)">
      <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3 Z" fill="#F59E0B" opacity="0.8"/>
    </g>
    <g transform="translate(210, 60)">
      <path d="M0,-7 L2,-2 L7,0 L2,2 L0,7 L-2,2 L-7,0 L-2,-2 Z" fill="#10B981" opacity="0.6"/>
    </g>
  </g>

  <!-- Text -->
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#10B981" letter-spacing="3" opacity="0.8">SEKOYA BLOG</text>
  <text x="600" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8" letter-spacing="1" opacity="0.6">Engineering Insights &amp; Perspectives</text>

  <!-- Bottom accent line -->
  <rect x="520" y="465" width="160" height="2" rx="1" fill="#10B981" opacity="0.4"/>
</svg>
