<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 514" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1200" y2="514" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="glow3" x1="100" y1="100" x2="1100" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.1"/>
      <stop offset="40%" stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="514" fill="url(#bg3)"/>
  <rect width="1200" height="514" fill="url(#glow3)"/>

  <!-- Circuit-like pattern -->
  <g opacity="0.06" stroke="#94A3B8" stroke-width="1">
    <path d="M100,257 H350"/>
    <path d="M850,257 H1100"/>
    <path d="M600,50 V150"/>
    <path d="M600,364 V464"/>
    <circle cx="350" cy="257" r="4" fill="#94A3B8"/>
    <circle cx="850" cy="257" r="4" fill="#94A3B8"/>
    <circle cx="600" cy="150" r="4" fill="#94A3B8"/>
    <circle cx="600" cy="364" r="4" fill="#94A3B8"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="400" cy="180" r="160" fill="#10B981" opacity="0.05"/>
  <circle cx="800" cy="300" r="160" fill="#6366F1" opacity="0.05"/>
  <circle cx="600" cy="257" r="200" fill="#F59E0B" opacity="0.03"/>

  <!-- Central browser window -->
  <g transform="translate(400, 100)">
    <rect width="400" height="280" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
    <!-- Title bar -->
    <rect width="400" height="36" rx="12" fill="#1E293B"/>
    <rect y="24" width="400" height="12" fill="#1E293B"/>
    <line x1="0" y1="36" x2="400" y2="36" stroke="#334155" stroke-width="1"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="5" fill="#EF4444" opacity="0.7"/>
    <circle cx="38" cy="18" r="5" fill="#F59E0B" opacity="0.7"/>
    <circle cx="56" cy="18" r="5" fill="#10B981" opacity="0.7"/>
    <!-- URL bar -->
    <rect x="80" y="10" width="240" height="16" rx="4" fill="#0F172A"/>
    <text x="200" y="22" text-anchor="middle" font-family="monospace" font-size="8" fill="#94A3B8" opacity="0.6">sekoya.tech</text>

    <!-- Code content - Astro component -->
    <g transform="translate(24, 50)">
      <text font-family="monospace" font-size="11" fill="#94A3B8" opacity="0.5"><tspan x="0" dy="0">---</tspan></text>
      <text font-family="monospace" font-size="11"><tspan x="0" dy="16" fill="#6366F1" opacity="0.7">import</tspan><tspan fill="#94A3B8" opacity="0.5"> { </tspan><tspan fill="#10B981" opacity="0.7">Component</tspan><tspan fill="#94A3B8" opacity="0.5"> } </tspan><tspan fill="#6366F1" opacity="0.7">from</tspan></text>
      <text font-family="monospace" font-size="11"><tspan x="0" dy="16" fill="#F59E0B" opacity="0.6">'./ui'</tspan></text>
      <text font-family="monospace" font-size="11" fill="#94A3B8" opacity="0.5"><tspan x="0" dy="16">---</tspan></text>
      <text font-family="monospace" font-size="11"><tspan x="0" dy="20" fill="#EF4444" opacity="0.5">&lt;</tspan><tspan fill="#10B981" opacity="0.7">Layout</tspan><tspan fill="#EF4444" opacity="0.5">&gt;</tspan></text>
      <text font-family="monospace" font-size="11"><tspan x="12" dy="16" fill="#EF4444" opacity="0.5">&lt;</tspan><tspan fill="#6366F1" opacity="0.7">Component</tspan></text>
      <text font-family="monospace" font-size="11"><tspan x="24" dy="16" fill="#F59E0B" opacity="0.6">client:visible</tspan><tspan fill="#EF4444" opacity="0.5"> /&gt;</tspan></text>
      <text font-family="monospace" font-size="11"><tspan x="0" dy="16" fill="#EF4444" opacity="0.5">&lt;/</tspan><tspan fill="#10B981" opacity="0.7">Layout</tspan><tspan fill="#EF4444" opacity="0.5">&gt;</tspan></text>
    </g>

    <!-- Islands indicator -->
    <g transform="translate(240, 56)">
      <rect width="136" height="200" rx="6" fill="transparent" stroke="#10B981" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>
      <!-- Static island -->
      <rect x="8" y="8" width="120" height="50" rx="4" fill="#10B981" opacity="0.08"/>
      <text x="68" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#10B981" opacity="0.5">Static HTML</text>
      <text x="68" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" opacity="0.4">0 KB JS</text>
      <!-- Interactive island -->
      <rect x="8" y="66" width="120" height="50" rx="4" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-width="1"/>
      <text x="68" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6366F1" opacity="0.6">Interactive</text>
      <text x="68" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" opacity="0.4">Hydrated</text>
      <!-- Static island -->
      <rect x="8" y="124" width="120" height="50" rx="4" fill="#10B981" opacity="0.08"/>
      <text x="68" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#10B981" opacity="0.5">Static HTML</text>
      <text x="68" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" opacity="0.4">0 KB JS</text>
    </g>
  </g>

  <!-- Edge nodes -->
  <g opacity="0.5">
    <!-- Top left -->
    <g transform="translate(150, 100)">
      <circle r="20" fill="#1E293B" stroke="#10B981" stroke-width="1.5" opacity="0.6"/>
      <text y="4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#10B981">Edge</text>
    </g>
    <line x1="170" y1="100" x2="400" y2="200" stroke="#10B981" stroke-width="1" opacity="0.15"/>
    <!-- Top right -->
    <g transform="translate(1050, 130)">
      <circle r="20" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
      <text y="4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6366F1">Edge</text>
    </g>
    <line x1="1030" y1="130" x2="800" y2="200" stroke="#6366F1" stroke-width="1" opacity="0.15"/>
    <!-- Bottom left -->
    <g transform="translate(180, 380)">
      <circle r="20" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
      <text y="4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#F59E0B">Edge</text>
    </g>
    <line x1="200" y1="380" x2="400" y2="320" stroke="#F59E0B" stroke-width="1" opacity="0.15"/>
    <!-- Bottom right -->
    <g transform="translate(1020, 360)">
      <circle r="20" fill="#1E293B" stroke="#10B981" stroke-width="1.5" opacity="0.6"/>
      <text y="4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#10B981">Edge</text>
    </g>
    <line x1="1000" y1="360" x2="800" y2="320" stroke="#10B981" stroke-width="1" opacity="0.15"/>
  </g>

  <!-- Text -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#F59E0B" letter-spacing="3" opacity="0.8">WEB DEV 2026</text>
  <text x="600" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8" letter-spacing="1" opacity="0.6">Islands Architecture &amp; Edge-First Deployments</text>

  <!-- Bottom accent -->
  <rect x="520" y="488" width="160" height="2" rx="1" fill="#F59E0B" opacity="0.4"/>
</svg>
